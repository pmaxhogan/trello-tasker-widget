<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Trello Inbox Sync</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
      }
      body {
        margin: 0;
        padding: 14px;
        min-width: 280px;
        font-size: 13px;
        line-height: 1.4;
      }
      h1 {
        margin: 0 0 8px 0;
        font-size: 14px;
      }
      label {
        display: block;
        margin: 10px 0 4px 0;
        font-weight: 600;
      }
      input[type="password"],
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        border: 1px solid rgba(128, 128, 128, 0.5);
        border-radius: 4px;
        font-family: ui-monospace, monospace;
        font-size: 12px;
      }
      button {
        margin-top: 10px;
        padding: 6px 10px;
        border-radius: 4px;
        border: 1px solid rgba(128, 128, 128, 0.5);
        cursor: pointer;
        font-size: 12px;
      }
      .status {
        margin-top: 12px;
        padding: 8px;
        border-radius: 4px;
        background: rgba(128, 128, 128, 0.1);
      }
      .muted {
        opacity: 0.7;
      }
      code {
        font-family: ui-monospace, monospace;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <h1>Trello Inbox Sync</h1>
    <p class="muted">
      Pushes the <code>cloud.session.token</code> cookie from
      <code>trello.com</code> to the trello-tasker-widget Worker so it can
      render your Trello Inbox.
    </p>

    <label for="inboxSessionKey">INBOX_SESSION_KEY</label>
    <input
      id="inboxSessionKey"
      type="password"
      placeholder="from Worker .env — distinct from the widget API_KEY"
    />

    <button id="save">Save</button>
    <button id="syncNow">Sync now</button>

    <div class="status" id="status">…</div>
    <script src="popup.js"></script>
  </body>
</html>
